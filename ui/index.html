<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Company Profiler</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
    <style>
        :root {
            --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            --color-border-primary: #000;
            --color-border-secondary: #ddd;
            --color-border-tertiary: #eee;
            --color-background-primary: #fff;
            --color-background-secondary: #f9f9f9;
            --color-text-primary: #111;
            --color-text-secondary: #666;
            --border-radius-lg: 12px;
            --border-radius-md: 8px;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--font-sans); background: #f5f5f5; color: var(--color-text-primary); }

        .container { padding: 1.5rem; max-width: 680px; margin: 0 auto; background: #fff; min-height: 100vh; }

        .search-row { display: flex; gap: 8px; margin-bottom: 2rem; }
        .search-row input { flex: 1; padding: 12px 16px; font-size: 16px; border: 1px solid var(--color-border-secondary); border-radius: var(--border-radius-lg); background: var(--color-background-primary); color: var(--color-text-primary); outline: none; }
        .search-row input:focus { border-color: var(--color-border-primary); }
        .search-row button { padding: 10px 24px; font-size: 15px; border-radius: var(--border-radius-lg); cursor: pointer; border: 1px solid var(--color-border-primary); background: var(--color-border-primary); color: #fff; font-weight: 500; transition: opacity 0.15s; white-space: nowrap; }
        .search-row button:hover { opacity: 0.8; }
        .search-row button:disabled { opacity: 0.5; cursor: not-allowed; }

        .section { background: var(--color-background-primary); border: 1px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.25rem; margin-bottom: 12px; }
        .section-title { font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; color: var(--color-text-secondary); margin-bottom: 0.75rem; display: flex; align-items: center; gap: 6px; }
        .section-body { font-size: 14px; line-height: 1.7; color: var(--color-text-primary); }

        .metrics { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 12px; }
        .metric { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 0.75rem 1rem; }
        .metric-label { font-size: 11px; color: var(--color-text-secondary); margin-bottom: 4px; }
        .metric-value { font-size: 14px; font-weight: 600; color: var(--color-text-primary); }

        .score-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
        .score-label { font-size: 13px; color: var(--color-text-secondary); width: 100px; flex-shrink: 0; }
        .score-bar { flex: 1; height: 6px; background: var(--color-background-secondary); border-radius: 3px; overflow: hidden; }
        .score-fill { height: 100%; border-radius: 3px; transition: width 0.8s ease; }
        .score-num { font-size: 13px; font-weight: 600; color: var(--color-text-primary); width: 35px; text-align: left; flex-shrink: 0; }

        .tag { display: inline-block; font-size: 11px; padding: 4px 10px; border-radius: 20px; margin: 2px; border: 1px solid var(--color-border-secondary); color: var(--color-text-secondary); background: #fff; }

        .verdict { padding: 1.25rem; border-radius: var(--border-radius-lg); margin-bottom: 16px; border: 1px solid; display: flex; gap: 12px; align-items: flex-start; }
        .verdict.good { background: #f0f7eb; border-color: #b8d9a0; color: #2d4d16; }
        .verdict.mixed { background: #fff9eb; border-color: #f5d6a0; color: #5c4316; }
        .verdict.bad { background: #fff5f5; border-color: #f5a0a0; color: #4d1616; }
        .verdict i { font-size: 20px; margin-top: 2px; }

        .loading { display: flex; flex-direction: column; align-items: center; padding: 4rem; gap: 1rem; color: var(--color-text-secondary); font-size: 14px; }
        .spinner { width: 32px; height: 32px; border: 3px solid #eee; border-top-color: #000; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .empty { text-align: center; padding: 5rem 2rem; color: var(--color-text-secondary); font-size: 15px; line-height: 1.8; }
        .empty i { font-size: 48px; display: block; margin-bottom: 1.5rem; opacity: 0.2; color: #000; }

        .error { background: #fff5f5; border: 1px solid #f5a0a0; border-radius: var(--border-radius-lg); padding: 1.25rem; color: #4d1616; font-size: 14px; margin-bottom: 12px; }
        ul.pros-cons { list-style: none; padding: 0; }
        ul.pros-cons li { padding: 6px 0; font-size: 14px; color: var(--color-text-primary); display: flex; gap: 10px; align-items: center; }
    </style>
</head>
<body>

<div class="container">
  <div style="margin-bottom:2rem">
    <h1 style="font-size:22px; font-weight:700; margin-bottom:8px; color:var(--color-text-primary)">פרופיל חברה לקראת ראיון</h1>
    <p style="font-size:14px; color:var(--color-text-secondary)">ניתוח מקיף לסניורים בשוק ההייטק הישראלי</p>
  </div>

  <div class="search-row">
    <input id="company-input" type="text" placeholder="לדוגמה: Wix, Semperis, monday.com..." />
    <button id="search-btn" onclick="research()">מחקר</button>
  </div>

  <div id="content">
    <div class="empty">
      <i class="ti ti-building-skyscraper"></i>
      הכנס שם חברה כדי לקבל פרופיל מפורט<br>
      <span style="font-size:13px; opacity:0.7">תרבות עבודה · עומסים · עבודה מרחוק · שכר · עתיד</span>
    </div>
  </div>
</div>

<script>
// Note: In a production environment, this should call a backend to avoid exposing API keys.
// For this skill, we assume the user provides their own key or uses a proxy.
const SYSTEM_PROMPT = `You are a senior tech job market analyst helping Israeli senior engineers evaluate companies before applying.
Research the company thoroughly and return ONLY valid JSON in this exact structure:
{
  "name": "Company Name",
  "tagline": "One sentence what they do",
  "founded": "Year",
  "employees": "e.g. 1,200 globally / 400 in Israel",
  "hq": "City, Country",
  "type": "Public / Private / Startup",
  "stage": "e.g. Series C / Public",
  "sector": "e.g. Cybersecurity / SaaS",
  "summary": "2-3 sentences about what the company does",
  "future": "2-3 sentences about growth trajectory",
  "culture": { "score": 1-10, "description": "...", "tags": ["Fast-paced"] },
  "workload": { "score": 1-10, "description": "...", "tags": ["Stable"] },
  "remote": { "score": 1-10, "policy": "Hybrid", "description": "..." },
  "team": { "description": "...", "tags": ["Seniors"] },
  "compensation": { "seniorRange": "40k-55k", "equity": "RSUs", "benefits": "..." },
  "pros": ["..."], "cons": ["..."],
  "verdict": "good/mixed/bad", "verdictText": "...",
  "glassdoor": 4.2
}`;

async function research() {
  const input = document.getElementById('company-input');
  const btn = document.getElementById('search-btn');
  const content = document.getElementById('content');
  const company = input.value.trim();
  if (!company) return;

  btn.disabled = true;
  content.innerHTML = '<div class="loading"><div class="spinner"></div><span>מנתח את ' + company + '...</span></div>';

  try {
    // This is a placeholder for the actual API call. 
    // In the nanobot environment, we would use the python script.
    // For the UI demo, we'll simulate or prompt the user.
    alert("ה-UI מוכן! בגרסה המלאה הוא יתחבר ל-Backend של הסקיל.");
    
    // For now, let's just show a mock if it's Semperis
    if (company.toLowerCase().includes('semperis')) {
        renderProfile({
            name: "Semperis",
            tagline: "Identity-driven cyber resilience for the hybrid enterprise.",
            founded: "2014",
            employees: "400+ globally",
            hq: "Hoboken, NJ (R&D in Israel)",
            type: "Private",
            stage: "Series C ($200M+)",
            sector: "Cybersecurity / ITDR",
            summary: "Semperis protects critical enterprise identity infrastructure (Active Directory) from cyberattacks. They are pioneers in Identity Threat Detection and Response (ITDR).",
            future: "Strong growth trajectory, surpassed $100M ARR in 2025. High demand for identity security makes them a stable and growing player.",
            culture: { score: 9, description: "Mission-driven, 'Force for Good' mentality. High engineering standards and collaborative environment.", tags: ["Mission-driven", "Expert-led", "Collaborative"] },
            workload: { score: 7, description: "Intense but rewarding. Typical for high-growth cyber startups but respects professional boundaries.", tags: ["High-growth", "Rewarding"] },
            remote: { score: 8, policy: "Hybrid (2 days in office)", description: "Flexible hybrid model with offices in Ramat Gan and Yokne'am." },
            team: { description: "Home to many Microsoft MVPs and top-tier security researchers. Very high seniority level.", tags: ["MVPs", "Security Experts", "Senior-heavy"] },
            compensation: { seniorRange: "45,000 - 58,000 NIS", equity: "Options with high upside potential", benefits: "Full social benefits, high-end gear, learning budget" },
            pros: ["Market leader in a hot niche", "Top-tier technical talent", "Strong financial stability", "Meaningful product"],
            cons: ["High expectations for autonomy", "Complex domain (AD) requires steep learning curve"],
            verdict: "good",
            verdictText: "A top-tier choice for senior engineers looking for technical depth and stability in the cyber sector.",
            glassdoor: 4.8
        });
    } else {
        content.innerHTML = '<div class="empty">הדגמה: נסה לחפש Semperis</div>';
    }
  } catch(err) {
    content.innerHTML = '<div class="error">שגיאה: ' + err.message + '</div>';
  }
  btn.disabled = false;
}

function scoreColor(s) {
  if (s >= 8) return '#639922';
  if (s >= 6) return '#BA7517';
  return '#E24B4A';
}

function renderProfile(d) {
  let html = `<div class="verdict ${d.verdict}">
    <i class="ti ti-${d.verdict === 'good' ? 'thumb-up' : d.verdict === 'mixed' ? 'balance' : 'alert-triangle'}"></i>
    <div><strong>${d.name}</strong> — ${d.verdictText}</div>
  </div>`;
  
  html += `<div class="metrics">
    <div class="metric"><div class="metric-label">עובדים</div><div class="metric-value">${d.employees}</div></div>
    <div class="metric"><div class="metric-label">שלב</div><div class="metric-value">${d.stage}</div></div>
    <div class="metric"><div class="metric-label">מטה</div><div class="metric-value">${d.hq}</div></div>
    <div class="metric"><div class="metric-label">תחום</div><div class="metric-value">${d.sector}</div></div>
    <div class="metric"><div class="metric-label">Glassdoor</div><div class="metric-value">⭐️ ${d.glassdoor}/5</div></div>
  </div>`;
  
  html += `<div class="section"><div class="section-title">על החברה</div><div class="section-body">${d.summary}</div></div>`;
  
  const scores = [
    { label: 'תרבות', val: d.culture.score },
    { label: 'איזון בית-עבודה', val: d.workload.score },
    { label: 'גמישות מרחוק', val: d.remote.score }
  ];
  
  html += `<div class="section"><div class="section-title">מדדים</div>`;
  for (const s of scores) {
    html += `<div class="score-row">
      <span class="score-label">${s.label}</span>
      <div class="score-bar"><div class="score-fill" style="width:${s.val*10}%; background:${scoreColor(s.val)}"></div></div>
      <span class="score-num">${s.val}/10</span>
    </div>`;
  }
  html += `</div>`;
  
  html += `<div class="section"><div class="section-title">שכר ותנאים</div><div class="section-body">
    <strong>טווח סניור:</strong> ${d.compensation.seniorRange}<br>
    <strong>אקוויטי:</strong> ${d.compensation.equity}<br>
    <strong>הטבות:</strong> ${d.compensation.benefits}
  </div></div>`;

  html += `<div class="section"><div class="section-title">יתרונות וחסרונות</div><ul class="pros-cons">
    ${d.pros.map(p => `<li><i class="ti ti-circle-check" style="color:#639922"></i> ${p}</li>`).join('')}
    ${d.cons.map(c => `<li><i class="ti ti-circle-x" style="color:#E24B4A"></i> ${c}</li>`).join('')}
  </ul></div>`;
  
  document.getElementById('content').innerHTML = html;
}
</script>
</body>
</html>
